<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>신규기사님 가이드</title>
    <link rel="preconnect" href="https://api.fontshare.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: light;
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --secondary: #20970b;
        --neutral: #9c9c9c;
        --bg: #fafafa;
        --surface: #ffffff;
        --text: #0a0a0a;
        --text-secondary: #6b6b6b;
        --border: #e8e8ec;
        --success: #10b981;
        --warning: #f59e0b;
        --error: #ef4444;
        --focus-ring: rgba(99, 102, 241, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--bg);
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 15px;
        line-height: 1.5;
      }

      a {
        color: inherit;
      }

      button,
      a {
        -webkit-tap-highlight-color: transparent;
      }

      .top-nav {
        position: sticky;
        top: 0;
        z-index: 10;
        display: grid;
        height: 56px;
        place-items: center;
        border-bottom: 1px solid var(--border);
        background: rgba(250, 250, 250, 0.82);
        backdrop-filter: blur(18px);
      }

      .brand {
        color: var(--text);
        font-family: "General Sans", "DM Sans", sans-serif;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0;
        text-decoration: none;
      }

      .shell {
        width: min(1280px, 100%);
        margin: 0 auto;
        padding: 32px 24px 64px;
      }

      .page-head {
        display: grid;
        gap: 16px;
        margin-bottom: 32px;
        text-align: center;
      }

      .page-title {
        margin: 0;
        color: var(--text);
        font-family: "General Sans", "DM Sans", sans-serif;
        font-size: clamp(24px, 9vw, 72px);
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0;
        white-space: nowrap;
      }

      .screen[hidden] {
        display: none;
      }

      .guide-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 24px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .guide-card {
        display: grid;
        min-height: 100%;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        text-decoration: none;
        transition: transform 200ms ease, box-shadow 200ms ease, border-color 200ms ease;
      }

      .guide-card:hover {
        transform: translateY(-2px);
        border-color: rgba(99, 102, 241, 0.28);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      }

      .guide-card:focus-visible,
      .back-button:focus-visible {
        outline: 0;
        box-shadow: 0 0 0 3px var(--focus-ring);
        border-color: var(--primary);
      }

      .preview {
        position: relative;
        height: 200px;
        overflow: hidden;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }

      .preview img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .preview--top img {
        object-position: top center;
      }

      .preview--left img {
        object-position: left center;
      }

      .preview--brand {
        display: grid;
        place-items: center;
        padding: 24px;
        background-color: var(--surface);
        background-image: url("assets/previews/item-4-bg.png");
        background-position: center;
        background-repeat: no-repeat;
        background-size: min(82%, 520px) auto;
        isolation: isolate;
      }

      .preview--brand::before {
        position: absolute;
        z-index: 0;
        inset: 0;
        background: rgba(255, 255, 255, 0.7);
        content: "";
      }

      .preview-title {
        position: relative;
        z-index: 1;
        color: var(--text);
        font-family: "General Sans", "DM Sans", sans-serif;
        font-size: 32px;
        font-weight: 700;
        line-height: 1.08;
        letter-spacing: 0;
        text-align: center;
        white-space: nowrap;
      }

      .card-body {
        display: grid;
        min-height: 132px;
        align-content: space-between;
        gap: 20px;
        padding: 20px;
      }

      .card-title {
        margin: 0;
        color: var(--text);
        font-family: "General Sans", "DM Sans", sans-serif;
        font-size: 24px;
        font-weight: 700;
        line-height: 1.12;
        letter-spacing: 0;
      }

      .card-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .card-note {
        color: var(--text-secondary);
        font-size: 13px;
        font-weight: 500;
      }

      .card-arrow {
        display: grid;
        width: 32px;
        height: 32px;
        flex: 0 0 32px;
        place-items: center;
        border: 1px solid var(--border);
        border-radius: 9999px;
        color: var(--primary);
        font-size: 18px;
        line-height: 1;
        transition: background 200ms ease, border-color 200ms ease, color 200ms ease;
      }

      .card-foot--icon-only {
        justify-content: flex-end;
      }

      .guide-card:hover .card-arrow {
        border-color: var(--primary);
        background: var(--primary);
        color: var(--surface);
      }

      .viewer-head {
        display: flex;
        align-items: center;
        min-width: 0;
        gap: 16px;
        margin-bottom: 24px;
      }

      .back-button {
        min-height: 38px;
        flex: 0 0 auto;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: transparent;
        color: var(--text);
        padding: 0 16px;
        font: inherit;
        font-size: 14px;
        font-weight: 700;
        white-space: nowrap;
        transition: transform 200ms ease, border-color 200ms ease, color 200ms ease;
      }

      .back-button:hover {
        transform: translateY(-1px);
        border-color: var(--primary);
        color: var(--primary);
      }

      .viewer-title-wrap {
        min-width: 0;
        flex: 1;
      }

      .viewer-title {
        margin: 0;
        color: var(--text);
        font-family: "General Sans", "DM Sans", sans-serif;
        font-size: clamp(28px, 5vw, 60px);
        font-weight: 700;
        line-height: 1.04;
        letter-spacing: 0;
        overflow: hidden;
        text-overflow: clip;
        white-space: nowrap;
      }

      .viewer-frame {
        display: grid;
        min-height: 360px;
        overflow: hidden;
        place-items: center;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
      }

      .viewer-frame video,
      .viewer-frame img,
      .viewer-frame iframe {
        width: 100%;
        max-width: 100%;
        border: 0;
      }

      .viewer-frame video {
        display: block;
        height: auto;
        max-height: 76vh;
        background: #0a0a0a;
      }

      .viewer-frame > img {
        display: block;
        width: auto;
        max-height: 78vh;
      }

      .viewer-frame iframe {
        display: block;
        height: 72vh;
        background: var(--surface);
      }

      .viewer-frame--pages {
        display: block;
        min-height: 0;
        overflow: visible;
        border: 0;
        border-radius: 0;
        background: transparent;
      }

      .pdf-pages {
        display: grid;
        gap: 20px;
        width: min(960px, 100%);
        margin: 0 auto;
      }

      .viewer-frame .pdf-page {
        display: block;
        width: 100%;
        height: auto;
        max-height: none;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
      }

      .viewer-frame--caution {
        display: block;
        min-height: 0;
        padding: clamp(24px, 4vw, 48px);
        place-items: initial;
      }

      .caution-guide {
        position: relative;
        overflow: hidden;
        isolation: isolate;
      }

      .caution-guide::before {
        position: absolute;
        z-index: -1;
        inset: 16% -10% auto;
        height: 360px;
        background-image: url("assets/previews/item-4-bg.png");
        background-position: center;
        background-repeat: no-repeat;
        background-size: contain;
        content: "";
        opacity: 0.08;
      }

      .caution-list {
        display: grid;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .caution-item {
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr);
        gap: 16px;
        padding: 22px 0;
        border-bottom: 1px solid var(--border);
      }

      .caution-item:first-child {
        padding-top: 0;
      }

      .caution-item:last-child {
        padding-bottom: 0;
        border-bottom: 0;
      }

      .caution-number {
        display: grid;
        width: 44px;
        height: 44px;
        place-items: center;
        border-radius: 9999px;
        background: var(--text);
        color: var(--surface);
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 16px;
        font-weight: 400;
        line-height: 1;
      }

      .caution-copy {
        display: grid;
        min-width: 0;
        gap: 8px;
      }

      .caution-main,
      .caution-detail {
        margin: 0;
        word-break: keep-all;
        overflow-wrap: anywhere;
      }

      .caution-main {
        color: var(--text);
        font-size: clamp(21px, 3.2vw, 30px);
        font-weight: 700;
        line-height: 1.32;
      }

      .caution-detail {
        color: var(--text-secondary);
        font-size: clamp(16px, 2.4vw, 21px);
        font-weight: 700;
        line-height: 1.45;
      }

      .caution-alert {
        color: var(--error);
        text-decoration-line: underline;
        text-decoration-color: rgba(239, 68, 68, 0.45);
        text-decoration-thickness: 4px;
        text-underline-offset: 4px;
      }

      .caution-footer {
        margin: 28px 0 0;
        color: var(--error);
        font-size: clamp(21px, 3.2vw, 30px);
        font-weight: 700;
        line-height: 1.3;
        text-align: center;
        text-decoration-line: underline;
        text-decoration-color: rgba(239, 68, 68, 0.45);
        text-decoration-thickness: 4px;
        text-underline-offset: 4px;
        word-break: keep-all;
      }

      @media (max-width: 1080px) {
        .guide-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .shell {
          padding: 24px 16px 48px;
        }

        .page-head {
          margin-bottom: 24px;
        }

        .guide-grid {
          grid-template-columns: 1fr;
          gap: 20px;
        }

        .preview {
          height: 184px;
        }

        .preview--brand {
          background-size: min(92%, 430px) auto;
        }

        .preview-title {
          font-size: 28px;
        }

        .card-body {
          min-height: 112px;
          padding: 18px;
        }

        .card-title {
          font-size: 24px;
          text-align: center;
        }

        .card-note {
          text-align: center;
        }

        .card-foot {
          justify-content: center;
        }

        .card-arrow {
          display: none;
        }

        .viewer-frame {
          min-height: 280px;
        }

        .viewer-frame > img {
          width: 100%;
          max-height: none;
        }

        .viewer-frame--caution {
          padding: 20px 18px;
        }

        .caution-guide::before {
          inset: 10% -32% auto;
          height: 300px;
          opacity: 0.07;
        }

        .caution-item {
          grid-template-columns: 36px minmax(0, 1fr);
          gap: 12px;
          padding: 19px 0;
        }

        .caution-number {
          width: 36px;
          height: 36px;
          font-size: 14px;
        }

        .caution-main {
          font-size: 21px;
        }

        .caution-detail {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="top-nav" aria-label="기본">
      <a class="brand" href="./">드라이브고</a>
    </nav>

    <main class="shell">
      <section class="screen" id="list-view">
        <header class="page-head">
          <h1 class="page-title">신규기사님 가이드</h1>
        </header>

        <ul class="guide-grid" aria-label="자료 목록">
          <li>
            <a class="guide-card" href="#item-3" data-item="item-3">
              <div class="preview preview--left">
                <img src="assets/previews/item-3.jpg" alt="">
              </div>
              <div class="card-body">
                <div>
                  <h2 class="card-title">탁송이란 ?</h2>
                </div>
                <div class="card-foot">
                  <span class="card-note">기본 개념</span>
                  <span class="card-arrow" aria-hidden="true">›</span>
                </div>
              </div>
            </a>
          </li>
          <li>
            <a class="guide-card" href="#item-4" data-item="item-4">
              <div class="preview preview--brand" aria-hidden="true">
                <span class="preview-title">탁송시 주의 사항</span>
              </div>
              <div class="card-body">
                <div>
                  <h2 class="card-title">탁송시 주의 사항</h2>
                </div>
                <div class="card-foot">
                  <span class="card-note">운행 전 확인</span>
                  <span class="card-arrow" aria-hidden="true">›</span>
                </div>
              </div>
            </a>
          </li>
          <li>
            <a class="guide-card" href="#item-2" data-item="item-2">
              <div class="preview">
                <img src="assets/previews/item-2.jpg" alt="">
              </div>
              <div class="card-body">
                <div>
                  <h2 class="card-title">로지 설치및사용방법</h2>
                </div>
                <div class="card-foot card-foot--icon-only">
                  <span class="card-arrow" aria-hidden="true">›</span>
                </div>
              </div>
            </a>
          </li>
          <li>
            <a class="guide-card" href="#item-1" data-item="item-1">
              <div class="preview">
                <img src="assets/previews/item-1.jpg" alt="">
              </div>
              <div class="card-body">
                <div>
                  <h2 class="card-title">아이콘 설치및사용방법</h2>
                </div>
                <div class="card-foot card-foot--icon-only">
                  <span class="card-arrow" aria-hidden="true">›</span>
                </div>
              </div>
            </a>
          </li>
        </ul>
      </section>

      <section class="screen" id="detail-view" hidden>
        <div class="viewer-head">
          <button class="back-button" type="button" id="back-button" aria-label="목록으로 돌아가기">목록</button>
          <div class="viewer-title-wrap">
            <h1 class="viewer-title" id="viewer-title"></h1>
          </div>
        </div>
        <div class="viewer-frame" id="viewer-frame"></div>
      </section>
    </main>

    <script>
      const materials = {
        "item-1": {
          title: "아이콘 설치및사용방법",
          kind: "video",
          src: "assets/item-1.mp4",
          poster: "assets/previews/item-1.jpg"
        },
        "item-2": {
          title: "로지 설치및사용방법",
          kind: "pages",
          pages: Array.from({ length: 23 }, (_, index) => {
            return `assets/logi-guide/page-${String(index + 1).padStart(2, "0")}.jpg`;
          })
        },
        "item-3": {
          title: "탁송이란 ?",
          kind: "video",
          src: "assets/item-3.mp4",
          poster: "assets/previews/item-3.jpg"
        },
        "item-4": {
          title: "탁송시 주의 사항",
          kind: "caution",
          footer: "퇴사시 사무실 꼭 연락!",
          rules: [
            {
              main: "출·도착 사진 꼭 잘 찍고 다니세요",
              details: [
                "앞유리, 계기판 포함 차량 전체 사진",
                "유일한 증거입니다"
              ]
            },
            {
              main: "콜을 잡고 배차시 꼭 바로 해당 상황실 통화 후 이동하세요",
              details: [
                "내일 예약콜이든 몇 시간 뒤 콜이든 항상 상황실 선 통화입니다"
              ]
            },
            {
              main: "현금, 완후, 즉후, 후불 정산 구분을 확인하세요",
              details: [
                "현금은 출·도착에서 확인",
                "완후·즉후는 배차완료 10분 후 자동정산",
                "후불은 익일 8시 자동정산"
              ]
            },
            {
              main: "슬리퍼, 반바지, 모자, 츄리닝, 등산복 절대 안됩니다",
              details: [
                "타투, 문신은 안 보이게 해주세요"
              ]
            },
            {
              main: "임의대로 그 어떤 것도 하시면 안됩니다",
              details: [
                "특히 주유 주의",
                "유료도로 톨비는 기본적으로 기사님 부담입니다"
              ]
            },
            {
              main: "차 안에 그 어떤 것도 손대지 마세요"
            },
            {
              main: "차량 내 흡연 절대 금지",
              details: [
                "클리닉 비용 청구",
                "차량 동승 절대 금지"
              ]
            },
            {
              main: "콜을 잡고 배차를 받으셨으면 꼭 이행하셔야 됩니다",
              details: [
                "콜 이행이 안 되는 경우 해당 상황실에 빨리 연락해서 취소해야 됩니다"
              ]
            },
            {
              main: "보험사고 접수시 자기부담금은 기사님 부담입니다",
              details: [
                "KB 30만원 · 현대 30만원",
                "동부 50만원 · 삼성 30만원"
              ]
            }
          ]
        }
      };

      const listView = document.querySelector("#list-view");
      const detailView = document.querySelector("#detail-view");
      const pageTitle = document.querySelector(".page-title");
      const viewerTitle = document.querySelector("#viewer-title");
      const viewerFrame = document.querySelector("#viewer-frame");
      const backButton = document.querySelector("#back-button");

      const clearViewer = () => {
        viewerFrame.textContent = "";
        viewerFrame.className = "viewer-frame";
      };

      const createViewer = (item) => {
        if (item.kind === "video") {
          const video = document.createElement("video");
          video.controls = true;
          video.playsInline = true;
          video.preload = "metadata";
          video.src = item.src;
          video.poster = item.poster;
          return video;
        }

        if (item.kind === "image") {
          const image = document.createElement("img");
          image.alt = item.title;
          image.src = item.src;
          return image;
        }

        if (item.kind === "pages") {
          const pages = document.createElement("div");
          pages.className = "pdf-pages";

          item.pages.forEach((src, index) => {
            const image = document.createElement("img");
            image.alt = `${item.title} ${index + 1}페이지`;
            image.className = "pdf-page";
            image.loading = index < 2 ? "eager" : "lazy";
            image.src = src;
            pages.append(image);
          });

          return pages;
        }

        if (item.kind === "caution") {
          const guide = document.createElement("article");
          guide.className = "caution-guide";

          const list = document.createElement("ol");
          list.className = "caution-list";
          list.setAttribute("aria-label", item.title);

          item.rules.forEach((rule, index) => {
            const row = document.createElement("li");
            row.className = "caution-item";

            const number = document.createElement("span");
            number.className = "caution-number";
            number.textContent = String(index + 1);

            const copy = document.createElement("div");
            copy.className = "caution-copy";

            const main = document.createElement("p");
            main.className = "caution-main";
            main.textContent = rule.main;
            copy.append(main);

            (rule.details || []).forEach((text) => {
              const detail = document.createElement("p");
              detail.className = "caution-detail";
              detail.textContent = text;

              if (/유일한 증거|특히 주유|절대 금지|꼭 연락/.test(text)) {
                detail.classList.add("caution-alert");
              }

              copy.append(detail);
            });

            row.append(number, copy);
            list.append(row);
          });

          guide.append(list);

          if (item.footer) {
            const footer = document.createElement("p");
            footer.className = "caution-footer";
            footer.textContent = item.footer;
            guide.append(footer);
          }

          return guide;
        }

        const frame = document.createElement("iframe");
        frame.title = item.title;
        frame.src = item.src;
        return frame;
      };

      const fitTitleToLine = (title, minSize) => {
        if (!title || title.closest("[hidden]")) {
          return;
        }

        title.style.fontSize = "";
        let size = Number.parseFloat(getComputedStyle(title).fontSize);
        const maxWidth = title.parentElement.clientWidth;

        if (!maxWidth) {
          return;
        }

        while (title.scrollWidth > maxWidth && size > minSize) {
          size -= 1;
          title.style.fontSize = `${size}px`;
        }
      };

      const fitPageTitle = () => fitTitleToLine(pageTitle, 24);
      const fitViewerTitle = () => fitTitleToLine(viewerTitle, 20);
      const fitVisibleTitles = () => {
        fitPageTitle();
        fitViewerTitle();
      };

      const openItem = (id, pushState = true) => {
        const item = materials[id];
        if (!item) {
          showList(false);
          return;
        }

        clearViewer();
        viewerTitle.textContent = item.title;
        viewerFrame.classList.toggle("viewer-frame--pages", item.kind === "pages");
        viewerFrame.classList.toggle("viewer-frame--caution", item.kind === "caution");
        viewerFrame.append(createViewer(item));
        listView.hidden = true;
        detailView.hidden = false;
        fitViewerTitle();

        if (pushState && window.location.hash !== `#${id}`) {
          history.pushState({ item: id }, "", `#${id}`);
        }

        window.scrollTo({ top: 0, behavior: "auto" });
      };

      const showList = (pushState = true) => {
        clearViewer();
        detailView.hidden = true;
        listView.hidden = false;
        fitPageTitle();

        if (pushState && window.location.hash) {
          history.replaceState({}, "", `${window.location.pathname}${window.location.search}`);
        }

        window.scrollTo({ top: 0, behavior: "auto" });
      };

      document.querySelectorAll("[data-item]").forEach((link) => {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          openItem(link.dataset.item);
        });
      });

      backButton.addEventListener("click", () => {
        showList();
      });

      window.addEventListener("popstate", () => {
        const id = window.location.hash.slice(1);
        if (id && materials[id]) {
          openItem(id, false);
        } else {
          showList(false);
        }
      });

      const initialItem = window.location.hash.slice(1);
      if (initialItem && materials[initialItem]) {
        openItem(initialItem, false);
      }

      fitVisibleTitles();
      window.addEventListener("resize", fitVisibleTitles);

      if (document.fonts) {
        document.fonts.ready.then(fitVisibleTitles);
      }
    </script>
  </body>
</html>
