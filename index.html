<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>신규기사님 가이드</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6f8;
        --panel: #ffffff;
        --text: #172033;
        --muted: #5d687a;
        --accent: #0f7b6c;
        --accent-soft: #e2f1ee;
        --line: #dbe2eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 20px 16px;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(640px, 100%);
        margin: 0 auto;
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .label {
        margin-bottom: 8px;
        color: var(--accent);
        font-size: 18px;
        font-weight: 900;
        letter-spacing: 0;
        text-align: center;
        text-transform: uppercase;
      }

      .page-title {
        margin: 0 0 24px;
        color: var(--text);
        font-size: clamp(24px, 9vw, 76px);
        font-weight: 900;
        line-height: 1.02;
        letter-spacing: 0;
        text-align: center;
        white-space: nowrap;
      }

      .screen[hidden] {
        display: none;
      }

      .file-list {
        display: grid;
        gap: 12px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .file-link {
        display: flex;
        align-items: center;
        min-height: 88px;
        justify-content: center;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: inherit;
        text-decoration: none;
      }

      .file-link:focus-visible {
        outline: 3px solid var(--accent-soft);
        outline-offset: 2px;
      }

      .file-copy {
        min-width: 0;
        flex: 1;
        text-align: center;
      }

      .file-title {
        display: block;
        color: var(--text);
        font-size: 28px;
        font-weight: 900;
        line-height: 1.18;
      }

      .viewer-head {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .back-button {
        min-height: 44px;
        flex: 0 0 auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--text);
        padding: 0 12px;
        font: inherit;
        font-weight: 800;
      }

      .viewer-title-wrap {
        min-width: 0;
        flex: 1;
      }

      .viewer-title {
        margin: 0;
        color: var(--text);
        font-size: 28px;
        font-weight: 900;
        line-height: 1.2;
      }

      .viewer-frame {
        display: grid;
        min-height: 360px;
        overflow: hidden;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #101820;
      }

      .viewer-frame video,
      .viewer-frame img,
      .viewer-frame iframe {
        width: 100%;
        max-width: 100%;
        border: 0;
      }

      .viewer-frame video,
      .viewer-frame img {
        display: block;
        height: auto;
        max-height: 72vh;
      }

      .viewer-frame iframe {
        display: block;
        height: 72vh;
        background: var(--panel);
      }

      .viewer-frame--pages {
        display: block;
        min-height: 0;
        overflow: visible;
        border: 0;
        background: transparent;
      }

      .pdf-pages {
        display: grid;
        gap: 12px;
        width: 100%;
      }

      .viewer-frame .pdf-page {
        display: block;
        width: 100%;
        height: auto;
        max-height: none;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      @media (max-width: 560px) {
        body {
          padding: 12px;
        }

        main {
          padding: 16px;
        }

        .file-title {
          font-size: 26px;
        }

        .viewer-frame {
          min-height: 280px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="screen" id="list-view">
        <div class="label">드라이브고</div>
        <h1 class="page-title">신규기사님 가이드</h1>
        <ul class="file-list" aria-label="자료 목록">
          <li>
            <a class="file-link" href="#item-3" data-item="item-3">
              <span class="file-copy">
                <span class="file-title">탁송이란 ?</span>
              </span>
            </a>
          </li>
          <li>
            <a class="file-link" href="#item-4" data-item="item-4">
              <span class="file-copy">
                <span class="file-title">탁송시 주의 사항</span>
              </span>
            </a>
          </li>
          <li>
            <a class="file-link" href="#item-2" data-item="item-2">
              <span class="file-copy">
                <span class="file-title">로지 설치및사용방법</span>
              </span>
            </a>
          </li>
          <li>
            <a class="file-link" href="#item-1" data-item="item-1">
              <span class="file-copy">
                <span class="file-title">아이콘 설치및사용방법</span>
              </span>
            </a>
          </li>
        </ul>
      </section>

      <section class="screen" id="detail-view" hidden>
        <div class="viewer-head">
          <button class="back-button" type="button" id="back-button">목록으로</button>
          <div class="viewer-title-wrap">
            <h1 class="viewer-title" id="viewer-title"></h1>
          </div>
        </div>
        <div class="viewer-frame" id="viewer-frame"></div>
      </section>
    </main>

    <script>
      const materials = {
        "item-1": {
          title: "아이콘 설치및사용방법",
          kind: "video",
          src: "assets/item-1.mp4"
        },
        "item-2": {
          title: "로지 설치및사용방법",
          kind: "pages",
          pages: Array.from({ length: 23 }, (_, index) => {
            return `assets/logi-guide/page-${String(index + 1).padStart(2, "0")}.jpg`;
          })
        },
        "item-3": {
          title: "탁송이란 ?",
          kind: "video",
          src: "assets/item-3.mp4"
        },
        "item-4": {
          title: "탁송시 주의 사항",
          kind: "image",
          src: "assets/item-4.jpg"
        }
      };

      const listView = document.querySelector("#list-view");
      const detailView = document.querySelector("#detail-view");
      const pageTitle = document.querySelector(".page-title");
      const viewerTitle = document.querySelector("#viewer-title");
      const viewerFrame = document.querySelector("#viewer-frame");
      const backButton = document.querySelector("#back-button");

      const clearViewer = () => {
        viewerFrame.textContent = "";
        viewerFrame.className = "viewer-frame";
      };

      const createViewer = (item) => {
        if (item.kind === "video") {
          const video = document.createElement("video");
          video.controls = true;
          video.playsInline = true;
          video.preload = "metadata";
          video.src = item.src;
          return video;
        }

        if (item.kind === "image") {
          const image = document.createElement("img");
          image.alt = item.title;
          image.src = item.src;
          return image;
        }

        if (item.kind === "pages") {
          const pages = document.createElement("div");
          pages.className = "pdf-pages";

          item.pages.forEach((src, index) => {
            const image = document.createElement("img");
            image.alt = `${item.title} ${index + 1}페이지`;
            image.className = "pdf-page";
            image.loading = index < 2 ? "eager" : "lazy";
            image.src = src;
            pages.append(image);
          });

          return pages;
        }

        const frame = document.createElement("iframe");
        frame.title = item.title;
        frame.src = item.src;
        return frame;
      };

      const fitPageTitle = () => {
        if (!pageTitle) {
          return;
        }

        pageTitle.style.fontSize = "";
        let size = Number.parseFloat(getComputedStyle(pageTitle).fontSize);
        const minSize = 24;
        const maxWidth = pageTitle.parentElement.clientWidth;

        if (!maxWidth) {
          return;
        }

        while (pageTitle.scrollWidth > maxWidth && size > minSize) {
          size -= 1;
          pageTitle.style.fontSize = `${size}px`;
        }
      };

      const openItem = (id, pushState = true) => {
        const item = materials[id];
        if (!item) {
          showList(false);
          return;
        }

        clearViewer();
        viewerTitle.textContent = item.title;
        viewerFrame.classList.toggle("viewer-frame--pages", item.kind === "pages");
        viewerFrame.append(createViewer(item));
        listView.hidden = true;
        detailView.hidden = false;

        if (pushState && window.location.hash !== `#${id}`) {
          history.pushState({ item: id }, "", `#${id}`);
        }

        window.scrollTo({ top: 0, behavior: "auto" });
      };

      const showList = (pushState = true) => {
        clearViewer();
        detailView.hidden = true;
        listView.hidden = false;
        fitPageTitle();

        if (pushState && window.location.hash) {
          history.replaceState({}, "", `${window.location.pathname}${window.location.search}`);
        }

        window.scrollTo({ top: 0, behavior: "auto" });
      };

      document.querySelectorAll("[data-item]").forEach((link) => {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          openItem(link.dataset.item);
        });
      });

      backButton.addEventListener("click", () => {
        showList();
      });

      window.addEventListener("popstate", () => {
        const id = window.location.hash.slice(1);
        if (id && materials[id]) {
          openItem(id, false);
        } else {
          showList(false);
        }
      });

      const initialItem = window.location.hash.slice(1);
      if (initialItem && materials[initialItem]) {
        openItem(initialItem, false);
      }

      fitPageTitle();
      window.addEventListener("resize", fitPageTitle);

      if (document.fonts) {
        document.fonts.ready.then(fitPageTitle);
      }
    </script>
  </body>
</html>
