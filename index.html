<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DriveGo Delivery</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6f8;
        --panel: #ffffff;
        --text: #172033;
        --muted: #5d687a;
        --accent: #0f7b6c;
        --accent-soft: #e2f1ee;
        --line: #dbe2eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 20px 16px;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(640px, 100%);
        margin: 0 auto;
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .label {
        margin-bottom: 16px;
        color: var(--accent);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .file-list {
        display: grid;
        gap: 12px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .file-link {
        display: flex;
        align-items: center;
        min-height: 72px;
        justify-content: space-between;
        gap: 18px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: inherit;
        text-decoration: none;
      }

      .file-link:focus-visible {
        outline: 3px solid var(--accent-soft);
        outline-offset: 2px;
      }

      .file-copy {
        min-width: 0;
        flex: 1;
      }

      .file-title {
        display: block;
        color: var(--text);
        font-size: 20px;
        font-weight: 800;
        line-height: 1.2;
      }

      .file-type {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.35;
      }

      .file-action {
        flex: 0 0 auto;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        padding: 8px 12px;
        font-size: 14px;
        font-weight: 800;
      }

      @media (max-width: 560px) {
        body {
          padding: 12px;
        }

        main {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="label">DriveGo Delivery</div>
      <ul class="file-list" aria-label="자료 목록">
        <li>
          <a class="file-link" href="assets/item-1.mp4">
            <span class="file-copy">
              <span class="file-title">1</span>
              <span class="file-type">동영상</span>
            </span>
            <span class="file-action">열기</span>
          </a>
        </li>
        <li>
          <a class="file-link" href="assets/item-2.pdf">
            <span class="file-copy">
              <span class="file-title">2</span>
              <span class="file-type">PDF</span>
            </span>
            <span class="file-action">열기</span>
          </a>
        </li>
        <li>
          <a class="file-link" href="assets/item-3.mp4">
            <span class="file-copy">
              <span class="file-title">3</span>
              <span class="file-type">동영상</span>
            </span>
            <span class="file-action">열기</span>
          </a>
        </li>
        <li>
          <a class="file-link" href="assets/item-4.jpg">
            <span class="file-copy">
              <span class="file-title">4</span>
              <span class="file-type">이미지</span>
            </span>
            <span class="file-action">열기</span>
          </a>
        </li>
      </ul>
    </main>
  </body>
</html>
