<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DriveGo Delivery</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --text: #172033;
        --muted: #5d687a;
        --accent: #0f7b6c;
        --line: #dbe2eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(720px, calc(100% - 32px));
        padding: 48px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.6;
      }

      .label {
        margin-bottom: 16px;
        color: var(--accent);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(40px, 7vw, 72px);
        line-height: 0.96;
        letter-spacing: 0;
      }

      @media (max-width: 560px) {
        main {
          padding: 32px 24px;
        }

        p {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="label">DriveGo Delivery</div>
      <h1>Coming Soon</h1>
      <p>DriveGo Delivery is preparing its public site.</p>
    </main>
  </body>
</html>
